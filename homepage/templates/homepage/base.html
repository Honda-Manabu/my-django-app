{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My homepage{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{% static 'homepage/styles.css' %}">
</head>
<body>
    <a id="top-button" class="btn btn-primary position-fixed" href="#header" style="display: none; right: 20px; bottom: 20px; z-index: 1000;">
        <i class="bi bi-box-arrow-up"></i>
    </a>

    <div class="container-xxl">
        {% include "homepage/ms_header.html" %}

        <main style="flex-grow: 1;">
            {% block content %}{% endblock %}
        </main>

        <footer class="row">
            <div class="col">
                <p>© Honda Manabu All rights reserved.</p>
                <p>My Email address : honda-m103742@coast.ocn.ne.jp</p>
                <p>ホームページへの感想やお問い合わせ、お持ちしております。</p>
            </div>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="{% static 'homepage/urllist.js' %}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var topButton = document.getElementById("top-button");
            
            // スクロールによるボタン表示制御
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    topButton.style.display = 'inline-block';
                } else {
                    topButton.style.display = 'none';
                }
            });

            // ナビゲーションのトグル制御 (Bootstrapの標準機能で動かない場合の補完)
            var toggler = document.getElementById("navbar-toggler");
            var menu = document.getElementById("navbarNavDropdown");
            if (toggler && menu) {
                toggler.addEventListener("click", function () {
                    menu.classList.toggle("show");
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
